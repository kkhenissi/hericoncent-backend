spring:
  application:
    name: hericonsent-backend

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    #    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hericonsent}
    #    username: ${DB_USER:postgres}
    #    password: ${DB_PASSWORD:postgres}
    #    driver-class-name: org.postgresql.Driver
    url: jdbc:h2:file:./data/hericonsent;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
        ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        #        dialect: org.hibernate.dialect.PostgreSQLDialect
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    # Default to H2 migrations for development; override with FLYWAY_LOCATIONS or FLYWAY_ENABLED
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration/h2}
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: kkhenissi@gmail.com
    password: "qttf hgni wfib icss"
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            trust: smtp.gmail.com
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  upload-dir: ${UPLOAD_DIR:./uploads}
  storage:
    strategy: ${STORAGE_STRATEGY:local}   # 'local' | 's3'
  s3:
    bucket: ${S3_BUCKET:hericonsent-documents}
    region: ${S3_REGION:eu-west-3}
    endpoint: ${S3_ENDPOINT:}             # MinIO : http://localhost:9000 (vide = AWS natif)
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
  jwt:
    secret: ${JWT_SECRET:hericonsent-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000        # 24h
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:4200